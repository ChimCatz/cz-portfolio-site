<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects Card</title>

  <!-- Font (Uiverse style) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />
  <script type="text/javascript">
    (function(c, l, a, r, i, t, y) {
      c[a] = c[a] || function() {
        (c[a].q = c[a].q || []).push(arguments);
      };
      t = l.createElement(r);
      t.async = 1;
      t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0];
      y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "wffc7pvytd");
  </script>
</head>
<body>

  <div class="projects-grid">

    <!-- CARD 1 -->
    <div class="card">
      <div class="card__border"></div>

      <div class="card_title__container">
        <span class="card_title">LeadFlow ETL</span>
        <p class="card_paragraph">
          Automated CRM pipeline processing 10k–50k records per run.
        </p>
      </div>

      <hr class="line" />

      <ul class="card__list">
        <li class="card__list_item">
          <span class="check"></span>
          <span class="list_text">50,000+ records/run</span>
        </li>
        <li class="card__list_item">
          <span class="check"></span>
          <span class="list_text">&lt;2 sec search</span>
        </li>
        <li class="card__list_item">
          <span class="check"></span>
          <span class="list_text">95% accuracy</span>
        </li>
      </ul>

      <button class="button">View Project</button>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <div class="card__border"></div>

      <div class="card_title__container">
        <span class="card_title">Call Conversion Tool</span>
        <p class="card_paragraph">
          Crossmatched VOIP and CRM data to track conversions.
        </p>
      </div>

      <hr class="line" />

      <ul class="card__list">
        <li class="card__list_item">
          <span class="check"></span>
          <span class="list_text">Automated validation</span>
        </li>
        <li class="card__list_item">
          <span class="check"></span>
          <span class="list_text">Cleaned datasets</span>
        </li>
        <li class="card__list_item">
          <span class="check"></span>
          <span class="list_text">Reliable reporting</span>
        </li>
      </ul>

      <button class="button">View Project</button>
    </div>

  </div>

</body>
</html>
